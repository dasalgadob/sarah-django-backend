runtime: python312

env_variables:
  DEBUG: False
  ALLOWED_HOSTS: "*.appspot.com"
  SECRET_KEY: "your-production-secret-key"
  DB_HOST: "/cloudsql/YOUR_PROJECT:REGION:INSTANCE"
  DB_NAME: "sarah_db"
  DB_USER: "postgres"
  DB_PASSWORD: "your-db-password"

instance_class: F2

automatic_scaling:
  min_instances: 1
  max_instances: 10
  target_cpu_utilization: 0.6

beta_settings:
  cloud_sql_instances: YOUR_PROJECT:REGION:INSTANCE