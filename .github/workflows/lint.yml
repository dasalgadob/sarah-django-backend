name: Lint

on:
  push:
    branches: [master, staging]
  pull_request:
    branches: [master, staging]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 . --max-line-length=120 --exclude=migrations,staticfiles
